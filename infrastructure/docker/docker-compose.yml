version: '3.9'

services:
  backend:
    build:
      context: ../../apps/backend
      dockerfile: Dockerfile
      target: development  # Use development stage for dev
    ports:
      - '4000:4000'
    environment:
      - NODE_ENV=development
      - PORT=4000
      # Database
      - MONGODB_URI=${MONGODB_URI}
      # JWT
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      # Supabase
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - SUPABASE_BUCKET=${SUPABASE_BUCKET:-chatapp-files}
      # Redis (use Upstash for both dev and prod)
      - REDIS_URL=${REDIS_URL}
      - REDIS_ADAPTER_ENABLED=${REDIS_ADAPTER_ENABLED:-false}
      # Email
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM}
      # OAuth
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      # Client URL (for CORS)
      - CLIENT_URL=${CLIENT_URL}
      # Sentry (optional)
      - SENTRY_DSN=${SENTRY_DSN}
      - SENTRY_RELEASE=${SENTRY_RELEASE}
      # Feature Flags
      - ENABLE_NEW_CHAT=${ENABLE_NEW_CHAT:-false}
      - MESSAGE_RETENTION_DAYS=${MESSAGE_RETENTION_DAYS:-30}
      - RATE_LIMIT_STRICT=${RATE_LIMIT_STRICT:-false}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ../../apps/backend/src:/app/src
      - ../../packages:/app/../../packages  # For shared package
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)}).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - chatapp-network

  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:4000
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_KEY=${VITE_SUPABASE_KEY}
        - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
        - VITE_SENTRY_DSN=${VITE_SENTRY_DSN}
        - VITE_SENTRY_RELEASE=${VITE_SENTRY_RELEASE}
    ports:
      - '3000:8080'
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - chatapp-network

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ${REDIS_PASSWORD:+-a \"$REDIS_PASSWORD\"} ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - chatapp-network

volumes:
  redis_data:

networks:
  chatapp-network:
    driver: bridge